名中郄詳穴在胻骨中直足少陰鄉膝關犢鼻下陷中二寸旁曲泉膝骨上內側輔骨下大小筋中間大筋上小筋下屈膝可取者正在橫紋頭合水虛補也陰包膝上四股內兩筋間卷足看內側中有槽可觀氣衝下三寸陰股動脈應五里又陰廉上一寸為定陰廉在氣衝下二寸五里上一寸急脈傍陰器去中二寸半按之隱指堅極按痛下上足厥陰大絡為睪丸之系睪丸者腎丸也針灸均莫亂大成無此穴遵金鑑補之章門一名長平一名脅髎大橫外直季脅肋端臍上有二寸兩旁六寸看側臥肘尖盡盡處穴已詳脾膜臟所會臟會章門又會足少陽期門肝之膜直乳二肋端乳旁一寸半在不容穴旁亦一寸半直下寸五看足厥陰太陰陰維會此方任脈經穴任脈廿四穴胸腹中綱紀會陰一名屏翳兩陰間在腎囊之下有縫通肛門陰器與肛門為兩陰也任督沖所起督由此行背任由行腹裡沖行足少陰針刺治溺水溺死者令人倒拖出水針以補法行之尿屎出則活非是切莫針此地關生死曲骨橫骨中臍下五寸毛際逢陷中動脈應與足厥陰通會肝經上一寸中極一名玉泉一名氣原臍下四寸窮為膀胱之膜足三陰會同關元小腸膜臍下三寸憑與足三陰會上一寸石門一名利機一名精露一名丹田一名命門石門三焦膜臍下二寸真臍下一寸五氣海一名脖胦一名下肓宛宛中上五分陰交臍下一寸會少陰及沖當膀胱上際三焦膜所逢神閥一名氣舍居臍內上一寸水分一名分水當小腸下口泌別濁與清入膀胱大腸水液入膀胱渣滓入大腸二穴皆禁針又一寸下脘臍上二寸憑穴當胃下口小腸上口承水穀從此入脈會足太陰建里臍上三中脘一名大會臍上四六腑所會地腑病宜治此腑會中脘手太陽少陽足陽明同會又為胃之膜胃虛引導是上脘一名胃脘臍上五絡脾而屬胃中脘亦然在脈足陽明手太陽同會上一寸巨闕心膜在此也再一寸鳩尾一名尾翳一名𩩲骭𩩲骭者胸之眾骨也因眾骨止此故名居兩歧骨下骨垂鳩尾形針灸莫輕者僅可針三分大妙手方針不然針取氣多令人夭中庭膻中下一寸六陷中橫量兩乳間膻中一名元見針莫攻足太陰少陰手太少陽同四脈之會上寸六玉堂一名玉英又寸六紫宮再寸六華蓋一寸璇璣蹤陷中仰面取針下三分窮天突一名天瞿結喉下在璇璣上一寸兩缺盆之中下針莫低手直下始為功針五分若低手而下傷人廉泉一名舌本結喉上中央是其蹤陰維任脈會低針一分通承漿一名懸漿唇稜下陷中開口取與太陽胃督各脈會於此督脈經穴督脈廿八穴走背腦中心長強一名氣之陰郄一名厥骨尾閭下骨端計三分是督脈之絡別走任脈云足少陰陽會治痔之本根腰俞一名背解一名體孔一名腰柱一名腦戶廿一椎其下宛宛中挺身伏地臥兩手支額重又令四體縱穴乃不能蒙陽關十六椎坐取莫倚斜十四椎命門一名屬累懸樞十三耶均須伏而取椎下莫教差脊中一名神宗一名脊俞十一椎中樞十椎下遵金鑑增入筋縮九椎與至陽七椎九椎七椎惹靈臺伏六椎神道五椎也身柱隱三椎陶道一椎者足太陽督脈相會陶道野均須仰取之各在椎下里脊中灸漫施灸之令人腰傴僂靈臺針莫把大椎一椎上陷者宛宛中手足三陽會百勞名亦同啞門一名舌厭一名舌橫一名喑門項中央入髮際五分督脈陽維會卻系舌之根此穴不可灸灸則啞無音風府一名舌本髮際寸疾言肉立起大筋內宛宛言休立下矣足太陽陽維與督脈會此是穴亦禁灸繼後腦戶一名合顱峙在枕骨上邊足太陽會是灸亦令人啞針灸俱無取上寸半強間一名大羽又寸半後頂一名交沖百會居頂中一名三陽一名五會一名顛上一名天滿亦離寸半定旋毛可容豆與兩耳尖並會手足三陽穴能治百病繼此為前頂亦離一寸五骨間微陷中顖會顖音信同囟頭會腦蓋頂門也子在母胎諸竅尚閉惟臍內氣囟為之通生則竅開口鼻納氣尾閭泄氣囟乃漸合陰陽升降之道也離前頂寸半又接武至八歲以後方可針分許八歲以前不可針緣小兒囟門未合刺之傷骨上星一名神堂入髮際一寸穴容豆神庭僅五分直鼻上相湊此穴亦禁針傷目發狂謬與足太陽會目翳針微透在鼻柱上端素髎穴禁灸在鼻端準頭鼻孔下陷中穴又名水溝一名人中手足陽明會又與腎脈交兌端唇上端齘交在唇內齒上齦縫中足陽明任會齘音銀齒本也齦亦音銀齒根肉衝脈帶脈陽蹺陰蹺陽維陰維分寄各穴衝脈起橫骨大赫並氣穴四滿與中注肓俞商曲列石關陰都地通谷幽門徹乃散入胸腹與腎經同測帶脈起季脅五樞維道側能回身一周附在膽經穴陽蹺起膀胱申脈僕參鄉循外踝上行其郄在附陽會膽經居髎又附於大腸肩髃及巨骨二穴可參詳小腸經臑俞胃經之地倉巨髎與承泣膀胱睛明鄉陰蹺起腎經然骨照海深再通交信穴終膀胱睛明陽維陽之維膀胱金門起走膽經陽交小腸臑俞際三焦臑會場天髎亦其地膽經穴最多肩井陽白位本神與臨泣目窗正營繼承靈並腦空風池日月系又附於督脈風府瘂門閉陰維起築賓先附於腎經脾經之腹哀大橫府舍尋肝經期門地又與任脈親天突廉泉位一十二穴真以上六脈各穴在諸經中已有位置分寸茲不復贅經外奇穴經外有奇穴鼻孔內迎香值大腸經近胃經督脈鼻準穴何在鼻柱尖上藏值督脈耳尖耳之尖值三焦經近膽經三焦脈出耳上角膽脈下從耳後人耳中卷耳取其端聚泉在舌上正當舌中央值脾經通心經吐舌直有縫陷中是其方金津與玉液在舌下兩旁捲舌見紫脈海泉舌下看三穴值脾經通腎經脾脈連舌本散舌下腎脈俠舌本魚腰眉中間沿皮向兩旁取之近膽經故人膽氣壯則眉上豎也眉後是太陽近三焦經膽經陷中紫脈上紐領脈始揚大骨空二穴手大指中節近肺經中魁中指背在第二節側近心包經陷中當骨尖均屈指可得五指歧骨間八邪按次列大都虎口上赤白肉際歇近大腸經食指中指叉上都在本節近心包絡經均須握拳取更以中都測中指無名指本節歧骨隙近心包絡經下都在何處四指小指得本節歧骨後一名中渚穴值三焦經左右手各四一一俱淮的八風在足上五指歧骨間大指次指歧骨間近肝經膽經以近肝經行間穴而膽經支脈循大指歧骨內出也次指中指歧骨間近胃經內庭穴中指四指歧骨間近胃經以胃脈之支別入中指外間也小指四指歧骨間近膽經俠谿穴十宣手指頭去爪一分看大指頭近肺經穴次指頭近大腸經穴又近心胞絡肺經以二經之支脈出次指端也中指頭近心包絡經穴四指頭近三焦經穴小指頭近心經小腸經穴肘尖肘尖上屈肘可得之值三焦經近小腸經心經肩柱骨何在肩端骨尖余近三焦經小腸經二百在掌後橫紋上四寸即郄門穴屬心包絡經筋內兩筋間間使後寸定一穴在筋外與筋內穴並共有四穴左右各二獨陰足二指指下橫紋里近胃經外踝骨尖均是立穴地內踝尖值肝經脾經在踝前腎經在踝後外踝尖膽經在前膀胱經在後夾之鬼眼在手足當大指內側手大指值肺經足大指值脾經兩指歧縫界去爪角韭葉手足各二穴以兩手大指用帛縛之當歧縫處盡穴治五癇當發疾時灸之甚效足穴亦然髖骨在膝上梁邱兩旁按即從梁邱穴兩旁各寸半每足二穴左近膽經右近肝經中泉手背腕陽谿陽池畔穴在溪池間陷中容易看內近大腸經外近三焦經四關在何處合谷大腸經太衝經肝是小指二節尖小骨空在此近心經小腸經印堂穴何在兩眉中陷中近膀胱經值督脈子宮中極旁各開三寸逢前胃經後肝經夾之龍元兩手側腕叉紫脈上近肺經禁針四縫手四指其內中節看高骨在掌後寸部前五分近肺經大腸經蘭門離曲泉兩旁三寸真近肝經百蟲窠二穴其實即血海值脾經陰囊囊底穴十字紋中在值督脈睛中在眼中黑珠正中取此穴冶內障後學莫輕試總之人周身寸寸皆是穴下針莫狐疑但開筋與骨遇著隔凝處傍針是真訣疼痛無定處細審自能得善針信左手法先在爪切不痛無他巧要分開血脈右手徐徐下深淺用耳測驚針手即止心與針管攝刺榮勿傷衛刺衛榮休賊既宜辨經絡又須明補瀉部分天人地迎隨別順逆陽九陰六數道與河洛葉指頭左右轉導引在呼吸進水似水涼進火似火熱青龍擺尾樣白虎搖頭格或交戰升降為宣通關節住痛手漫捻左九右六別泄則遲按摩補則急捫塞手法難盡言粗心人便拙補瀉倘不明平針最穩協候氣至沉緊氣松方出得下急便傷氣出猛便傷血前後面不同深淺當明白前面似井深後面薄餅隔背穴須淺刺應聲手便歇令患人仰臥方刺腹上穴以手重揉按肚腸離兩側胸膺與腹殊亦在淺刺列頭面少深刺艾灸毋多設手足有淺深認準筋骨隙貴賤既攸殊肥瘦尤相越太淺病麻除太深氣恐泄審穴須相時時哉弗可失春夏須淺取秋冬可深測飢渴醉飽人暴雨狂風刻喜怒男女交行路未休息凡此須緩刺令人心惻惻前賢良法多後學貴採擇果能通神妙百倍於藥為作此便誦讀細密與君說記得穴道清下手方有則人身尺寸歌人身有尺寸先將頭部說前後至髮際折作十二節為一尺二寸寸分准此測髮際倘不明眉心直上行量至大椎上一尺八無零生人髮際高低不一不若徑從大椎量至眉心為妥橫寸如何取內外兩眥明內角至外角恰好一寸憑從目胞下陷中處外眥內量至內眥紅肉止方與中指中節兩橫紋頭同身寸相合若從內外兩眥盡處量之則恰合兩橫紋頭外之中節長短也神庭至曲差曲差至本字申再至頭維穴各一寸半臨自神庭合計四寸五分真背部廿一椎通共作三尺大椎至尾骨三尺軀所積一寸四分一上七椎每節共九寸八分七釐每椎亦不窄一寸六分一中七椎相隔一尺一寸二分七釐分釐共審的一寸二分六下七椎各得共八寸八分二釐直行均可測第二行俠脊各一寸半長內並脊一寸四寸分兩旁第三行俠脊各三寸分疆內並脊一寸七寸兩旁看膺腹部分寸原用對乳間橫折作八寸前後穴可探以中指同身寸量之則左右至乳尖內旁共得八寸若直寸取穴先准看天突在結喉下兩缺盆之中天突至膻中兩乳之間陷中處六寸八分足下行至中庭又是一寸六共作八寸四又看歧骨際直下至臍心原是八寸地臍心至曲骨五寸當毛聚手足如何定中指同身寸背部之橫行亦用此為信總之人周身同身寸為則男左女右手中指第二節中指與大指相交如環屈兩橫紋之尖橫離一寸測身形有長短據此為準的但能明此理分寸無差失跋余患拘攣至不能俯仰將十年癸酉十月朔遇聶復生先生於濟寧行針灸灸十餘歷針逾二百期年如常人綜其治法不外針灸大成一書察其運用手與神會以視以聽若有獨得正如運斤成風堊去而鼻不傷規規於古法求之亦有不盡然者身受其益莫能悉其妙殆亦聖則力而智則巧耶噫治法必人而興針危器也刺危道也病危機也危機而以危器行危道求安於危蓋亦難矣故用之當效捷影響一不當呼吸間廢且死禍於將來幸耳無惑乎針法之失傳久也非聶先生之仁明廉慎其孰能神於斯成書具在人得習之原聶先生非其人毋傳也偶讀針灸大成書其後同治甲戌冬月上浣瀋陽裕麟識於京邸酌愚昧淡之軒
