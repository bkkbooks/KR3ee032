body:
  text: 手太陰肺經手太陰肺經膺胸前兩旁高處也間中府一名膺俞起雲門下寸六下一寸六分以後言寸幾者仿此乳上三肋里肋虛則切肋之單條骨脈應手陷中胸旁六寸取去胸中行旁開六寸也以後言旁幾寸者仿此手足太陰會肺膜結於此原文膜作募雲門巨骨即膺上肩下之大骨大腸經之巨骨穴因此得名下氣戶旁二寸去胸中旁行以六寸為定陷中有動脈舉臂音秘自肩至肘曰臑自肘至腕曰臂又為上身兩大肢之通稱取之應天府腋音澤左右脅之間也下三謂三寸也以後言單數者仿此動脈應手間肘腕胳膊中節上下骨交接處為肘音帚其能宛屈為腕音宛上五寸鼻尖點墨參以墨塗鼻尖舉臂轉頭向鼻墨點到處是穴府後為俠白去肘五寸測亦在動脈中肘腕即尺澤屈肘橫紋理筋骨中陷缺手太陰合水肺實便當瀉孔最腕手腕也上七側取斯為的列缺腕亦手腕側上一寸五分畢兩手交叉取食指盡處立以患人大指食指交叉虎口中食指盡處是穴也食指即第二指兩筋骨罅呼訝切音嚇裂也孔罅也中通任脈最密經渠寸口取動脈復陷中手太陰經金勿灸令神蒙太淵一名大泉掌後取內側橫紋頭諸脈所會地脈會太淵寅時氣血流肺虛須用補輸土動脈求穴在動脈中大指本節指之後節曰本節後魚際以形象魚得名白肉際陷中散脈中肺經滎火地大指之內側指向胸者曰內去爪角韭葉少商肺井木喉閉微出血手陽明大腸經手陽明大腸井金起商陽一名絕陽食指之內側爪角韭葉詳本節前二間一名間谷節後三間一名少谷藏均內側陷中滎水輸木鄉合谷在虎口此穴透勞宮大腸脈之原歧骨間陷中骨兩叉者曰歧居腕臂掌之交曰腕中上側陽谿一名中魁兩筋通張大指次指其穴即陷中手陽明經火以次偏歷逢腕中後三寸絡脈走太陰大腸經絡脈別走肺經溫溜一名逆注一名池頭在腕後上側六寸間遵醫宗金鑑改正下廉輔骨下銳肉分處看溫溜上二寸五分再寸上廉觀再寸手三里肉起銳肉端上二寸曲池以手拱胸取屈肘橫紋頭合土定於此肘髎音聊依大骨外廉骨際曰廉陷中處五里行向里大脈中央際離肘上三寸卻是禁針地臂臑音導肘上七肩髃下一寸恰在膕音國膕曲腳中也在肩之腳故云膕肉端兩筋兩骨罅宛宛陷中央脈與陽維會及手足太陽手陽明之絡伸臂平手看肩髃音虞一名中肩井一名偏肩膊音博肩膊也骨頭恰在肩端上舉臂即有空兩骨罅間看巨骨肩尖上兩叉骨罅間陽蹺脈相會與肩髃同參天鼎缺盆上扶空後一寸扶突一名水穴氣舍上一寸五分正在頸當曲頰頰者耳前顴側兩旁之稱曲頰者頰骨曲如環形受頰車骨尾之鉤者也下一寸為定人迎後寸半仰取穴莫遁禾髎一名長顣又名禾窌鼻孔下俠水溝之旁恰好離五分陽明氣發皇大腸經氣所發迎香穴禁灸手足陽明會上禾髎一寸鼻旁五分外若求內迎香鼻孔通臭味足陽明胃經足陽明胃經其穴頭維起本神旁寸五額角髮際之下兩眉之上曰額兩旁骨稜起者曰額角髮際取又去神庭旁四寸五分擬下關在耳前動脈下廉里骨際曰廉合口即有空開口則閉矣足陽明少陽二脈會於此頰車下牙床骨起處在耳下八分開口便有空令人側臥取曲頰端陷中承泣目胞下胞者外衛之胞也直瞳子陷中陽蹺與任脈一一會其宮其病目翳綠禁灸亦禁針四白在目下一寸直瞳子針刺僅三分反是目烏矣巨髎鼻孔旁八分直瞳子平水溝手足陽明經陽蹺脈會此口吻音汶口邊也四分外近下脈微動亦三脈所會地倉穴甚重曲頷胡感切口含物之車也曲頷者耳下頸上之曲骨處前寸二骨陷中動脈口下當兩肩此是大迎穴頸大脈應手結喉旁寸五仰取見人迎一名五會會足少陽部結喉者喉之管頭人瘦者多見頸大筋之前正直人迎下其穴名水突一名水門又下為氣舍貼骨尖陷中外旁缺盆一名天蓋大肩前橫骨中狀如盆在架氣戶巨骨下俞府旁二寸亦在雲門旁二寸戶下一寸六庫房穴莫遁房下寸六分屋翳更可症屋下再寸六好把膺窗認其穴各陷中去中各四寸均須仰取之四穴於斯定乳中乳之中微刺卻禁灸乳根下寸六去中四寸有不容更承滿梁門復關門太乙滑肉門均一寸相承去中各三寸六穴得其真自不容至滑肉門醫宗金鑑均去中旁開二寸天樞一名長溪一名谷門大腸膜去肓俞一寸俠臍之兩旁二寸陷中論外陵天樞下大巨繼外陵各直下一寸去中二寸行水道巨下三再二寸歸來去中各二寸下一又氣街原名氣衝宛宛動脈應殆衝脈起哉素問刺中脈血不出為腫鼠璞東垣吐血多不愈以三稜針於氣街出血立愈髀關伏兔後正值交紋中伏免按捺上有肉起如伏兔之狀故名在膝上六寸肉起隆取穴正跪坐三指按捺工陰肺一名陰鼎拜揖取伏兔下陷中膝之上三寸禁灸伏兔同梁邱在膝上二寸兩筋間犢鼻狀如牛鼻故名形陷中膝眼當兩旁微刺莫輕縱出液足便傷素問刺出液為跛三里膝眼下三寸大筋旁胻骨俗名臁脛骨其骨兩根在前者形粗膝外突出之骨也在後者名輔骨形細膝內側之小骨也此則指形粗膝外之骨而言之外側胃脈合土參再三寸上廉一名上巨虛兩筋骨罅中再二寸條口舉足取之同下廉一名下巨虛條口下一寸兩筋骨罅中如何取蹲地舉足得外踝踝者胻骨之下足跗之上兩旁突出之高骨也在外者為外踝在內者為內踝上八寸胻骨外陷中豐隆胃之絡別走太陰宮解谿居腕腳掌骨交接能宛屈處也上衝陽後寸五陷中系鞋處次指直上取所行為經火胃虛宜用補衝陽跗上腳背也五去陷谷二寸骨間有動脈胃脈之原徑陷谷次指外本節後陷中去內庭二寸胃脈輸木逢內庭次指外本節歧骨會其穴形陷中陽明滎水界去爪甲韭葉指端為厲兌井金胃脈終實則瀉無害足太陰脾經足太陰脾經大指之內側井木隱白起去爪角韭葉大指次節末遵金鑑改正內側而陷中大都在骨縫赤白肉際逢脾脈滎火地虛以補為功足大指內側太白內踝見足陽明胃經注前核骨本節骨隆起如核下陷中輸土在是焉大指本節後一寸是公孫內踝前絡脈足太陰之絡別走足陽明又交通衝脈合於胃胸心足內踝骨下微前而陷中前封中封也後照海其中商邱逢經金系此穴脾實瀉為功內踝上三寸夾骨陷中真足三陰所會三陰交斯名瀉三陰交補合谷能下胎瀉合谷補三陰交能安胎妊婦慎之內踝上六寸夾胻骨注見陽明胃經內此則指膝內側之骨而言陷中其穴名漏谷一名太陰絡以次地機一名脾舍逢在膝下五寸內側輔骨見足陽明胃經注隆郄脈伸足取夾骨下有空曲膝橫紋頭內側輔骨下陰陵泉陷中伸屈可取也與陽陵泉對稍高一寸者足太陰合水內外莫相假陽陵泉在外陰陵泉在內膝臏膝上蓋骨也上一寸內廉白肉際血海穴陷中再上箕門閉陰股足之大腿陰股者向內面之股也起筋間動脈應手細難禁手重按恰在魚腹地再上即衝門一名上慈宮府舍下一寸橫骨之兩端約紋動脈應去腹中橫行四寸五分定上一寸府舍金鑑從衝門上行七分會厥陰陰維三脈絡脾肝更與心肺依上二寸腹結一名腸窟金鑑從府舍上行三寸寸三大橫依太陰陰維會再上腹哀隨相去三寸五穴亦會陰維各去腹中行四寸五分微金鑑自衝門至腹哀均上腹中行旁開三寸半食竇舉臂取天溪下寸六天溪穴陷中再上胸鄉續旋有周榮繼各離六寸促均仰取去胸旁行六寸足大包在腋下六寸九肋間又在洲液下三寸為脾脈大絡總諸絡陰陽由脾灌五臟足太陰穴完手少陰心經手少陰心經極泉臂內探有動脈入胸在腋下筋間青靈舉臂取細看肘上三少海一名曲節肘內廉節後大骨外肘後端五分屈肘向頭蓋手太陰合水禁灸得安泰靈道居掌後寸半屬經金通里腕側外腕後寸陷中原文掌後一寸陷中未實指何處今遵金鑑改正手少陰之絡別走小腸經陰郄動脈應掌腕後五分掌後銳骨端陷中是神門轉手令骨開得穴始為真手少陰輸土實則瀉之云小指本節末外側骨縫中原文系本節後骨縫陷中似與後谿穴相混今從金鑑改正陷中少府穴心經滎火紅小指之內側去爪角韭葉並木虛則補視此少衝一名經始穴手太陽小腸經手太陽小腸小指外側端爪角下一分少澤一名小吉井金鄉手小指外側本節前陷中小腸脈滎水穴在前谷通後谿通督脈合於目內眥及頸項耳肩膊小腸膀胱亦小指外側本節後陷中橫紋握拳得在橫紋尖上手太陽輸木虛以補為訣腕骨手外側腕前起骨下小腸脈之原罅縫陷中也陽谷手外側腕下銳骨下小腸脈經火亦是陷中者手踝骨前上掌後兩大骨名手踝骨陷中名養老腕後一寸支正手外廉腕後五寸考手太陽絡脈別走心經好肘外大骨外去肘端五分屈肘向頭取陷中小海真小腸脈合土實則瀉之云肩貞曲胛下胛者即髃骨之末成片骨也亦名肩膊俗名鍁板子骨所謂髃骨者肩端之骨也大腸經肩髃穴在此即肩胛骨臼頭之上稜骨也其臼接臑骨上端俗曰肩頭其外曲捲翅骨肩後之稜骨也其下稜骨在背肉內在兩骨解間肩端之骨節解處也肩髃後陷中以次臑俞探臑俞俠肩髃其後大骨下臑者肩膊下內側對腋處高起耎白肉也自肩至肘皆曰臑胛上廉陷中舉臂可取也與陽維陽蹺三脈所會者天宗秉風后大骨下陷中秉風天髎外又在曲垣之後舉臂即有空肩上小髃後四脈所會同手太陽陽明手足少陽通曲垣肩中央在曲胛陷中按之應手痛痛處穴難蒙肩外俞陷中肩胛上廉取去脊傍幾何只在三寸裡再上肩中俞在肩胛內廉去大椎二寸原文去脊二寸今遵金鑑改正較顯明陷中亦復然頸之大筋前原文大筋間今依金鑑改正恰在曲頰下天窗一名窗籠穴陷中動脈應手者耳下曲頰後其穴即天容顴髎音聊又通作窌故窌深空處也頄骨下頄音求䪼內鼻旁間近生門牙之骨也䪼音拙目下之眶骨顴骨內下連上牙床者也顴音權面兩旁之高起大骨也總之目眶上骨眉稜骨下即䪼骨䪼骨之外即顴骨䪼骨顴骨之間近生門牙者曰頄骨銳骨端陷中手太少陽會以次為聽宮一名多所聞耳中之珠子有如小豆紅會手足少陽手太陽穴終足太陽膀胱經足太陽膀胱晴明一名淚孔穴始章內眥音次眼角也近鼻者曰內近鬃者曰外外一分會者手太陽足陽明陰蹺陽蹺脈同商可刺一分半禁灸攢竹一名始光一名員柱一名光明針宜瀉治治目疾用細三稜針刺之以瀉熱氣兩眉頭陷中再直眉頭上二穴名眉沖神庭曲差間禁灸攢竹同曲差入髮際神庭旁寸五五處上星旁一寸半為伍直行離五分二穴相接武寸五上承光通天絡卻一名強陽一名腦蓋起三穴去中行橫直寸五取以上遵金鑑校正玉枕絡卻後直下寸半間俠腦戶之旁卻是一寸三起肉枕骨上髮際二寸探天柱俠項後髮際大筋外項戶讓切頭後也陷中頭部終以下言肩背一椎下陷中骨會於大抒手足太少陽督脈別絡與二椎下風門一名熱府肺俞三椎伍刺中肺三日死其動為咳均正坐取之去脊音積俗名背梁骨共二十一椎旁寸五肺俞穴更明引繩宜對乳或搭手取之左手取右部右手取左穴中指末為主厥陰一名厥俞與心俞刺中心一日死其動為噫督俞膈俞場刺中膈一歲內必死四厥陰五心俞六督俞七膈俞椎其下之兩旁去脊各寸半血會膈俞方肝俞刺中肝五日死其動為欠九椎下膽俞刺中膽一日半死其動為嘔十椎量脾俞刺中脾十日半死其動為吞十一椎胃俞十二詳十三椎三焦俞均在下兩旁去脊各寸半正坐取之良腎俞刺中腎六日死其動為嚏與臍平十四椎下定再有氣海